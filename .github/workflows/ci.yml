name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pack:
    runs-on: macos-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore solution
        run: dotnet restore nuget-graph.sln

      - name: Build solution
        run: dotnet build nuget-graph.sln --configuration Release --no-restore --verbosity minimal

      - name: Pack packages
        run: |
          mkdir -p ./artifacts/packages
          dotnet pack nuget-graph.sln --configuration Release --no-build --verbosity minimal --output ./artifacts/packages

      - name: Restore Blazor sample
        run: dotnet restore samples/Italbytz.Graph.Blazor.Sample/Italbytz.Graph.Blazor.Sample.csproj

      - name: Build Blazor sample
        run: dotnet build samples/Italbytz.Graph.Blazor.Sample/Italbytz.Graph.Blazor.Sample.csproj --configuration Release --no-restore --verbosity minimal

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

      - name: Publish NuGet packages
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v') && env.NUGET_API_KEY != ''
        run: |
          for package in artifacts/packages/*.nupkg; do
            dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Publish NuGet symbol packages
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v') && env.NUGET_API_KEY != ''
        run: |
          for package in artifacts/packages/*.snupkg; do
            dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
